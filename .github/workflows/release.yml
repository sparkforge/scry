name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: scry
            asset_name: scry-linux-x86_64

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: scry
            asset_name: scry-macos-arm64

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: scry
            asset_name: scry-macos-x86_64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: scry.exe
            asset_name: scry-windows-x86_64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          # Linux
          cp artifacts/scry-linux-x86_64/scry release/scry-linux-x86_64
          chmod +x release/scry-linux-x86_64
          # macOS ARM64
          cp artifacts/scry-macos-arm64/scry release/scry-macos-arm64
          chmod +x release/scry-macos-arm64
          # macOS x86_64
          cp artifacts/scry-macos-x86_64/scry release/scry-macos-x86_64
          chmod +x release/scry-macos-x86_64
          # Windows
          cp artifacts/scry-windows-x86_64.exe/scry.exe release/scry-windows-x86_64.exe

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/scry-linux-x86_64
            release/scry-macos-arm64
            release/scry-macos-x86_64
            release/scry-windows-x86_64.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
